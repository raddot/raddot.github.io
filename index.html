    .container {

    }

    .intro {
      flex: 1;

    .intro h1, .intro h2, .intro h3 {

    }
    .intro h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .intro p {
      font-size: 1.25rem;
      color: #555;
    }

    .photo-nav-container {
      position: relative;
      width: 300px;   /* width of the oval image container */
      height: 400px;  /* height for the oval shape */
      flex-shrink: 0;
      /* push to right side by virtue of container’s space-between */
    }

    .photo-nav-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50% / 50%;  /* oval shape */
      display: block;
    }

    .nav-around {
      position: absolute;
      top: 50%;
      left: -120px;  /* shift left of the image; adjust as needed */
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end; /* align the nav block’s right edge toward the image */
    }

    .nav-around a {
      text-decoration: none;
      color: #000;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border-radius: 0.5px;
      font-size: 1rem;
      margin-bottom: 10px;
      transition: background 0.3s ease;
    }
    .nav-around a:hover {
      background: rgba(255, 255, 255, 0.7);
    }

    /* responsive fallback: on narrow screens stack everything */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        text-align: center;
        margin: 0;
      }
      .container {
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .intro {
        max-width: 100%;
        margin-bottom: 20px;
      }
      .photo-nav-container {
        width: 200px;
        height: 260px;
        margin: 0 auto;
      }
      .nav-around {
        position: relative;
        left: 0;
        transform: none;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        margin-top: 1px;
      }
      .nav-around a {
        margin: 0 3px;
        font-size: 0.9rem;
      }
